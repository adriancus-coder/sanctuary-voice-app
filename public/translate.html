<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sanctuary Voice Main Screen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="display-body display-theme-dark">
  <main class="participant-shell participant-shell-v2 unified-display-shell">
    <section class="participant-header panel glass-panel participant-hero-v2 unified-display-top" id="displayChrome">
      <div class="participant-controls unified-display-controls unified-display-controls-single">
        <div class="button-row compact-row participant-audio-actions">
          <button id="fullscreenBtn" class="btn btn-primary" type="button">Full screen</button>
        </div>
      </div>
      <div class="eyebrow" hidden>Sanctuary Voice Main Screen</div>
      <h1 id="translateEventName" hidden>Connecting...</h1>
      <div id="translateStatus" class="muted" hidden>Connecting to live event...</div>
      <div id="translateModeBadge" hidden>Auto</div>
      <div id="translateLanguageLabel" hidden>-</div>
      <select id="translateLanguage" hidden></select>
    </section>

    <section id="translateTextWrap" class="participant-live panel glass-panel unified-display-live">
      <div id="displayClock" class="display-clock clock-top-right" style="display:none">00:00</div>
      <div class="label" id="translateScreenLabel" hidden>Live service translation</div>
      <div id="translateText" class="participant-main-text unified-display-text">Waiting for translation...</div>
      <div id="translateDualText" class="unified-display-dual" hidden>
        <div class="unified-display-language-card">
          <div id="translatePrimaryLanguageLabel" class="unified-display-language-label">Language</div>
          <div id="translatePrimaryText" class="unified-display-language-text">Waiting for translation...</div>
        </div>
        <div class="unified-display-language-card">
          <div id="translateSecondaryLanguageLabel" class="unified-display-language-label">Language</div>
          <div id="translateSecondaryText" class="unified-display-language-text">Waiting for translation...</div>
        </div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/translate.js"></script>
</body>
</html>
