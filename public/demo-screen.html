<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sanctuary Voice — Main Screen Preview</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="display-body display-theme-dark">
  <main class="participant-shell participant-shell-v2 unified-display-shell">
    <section class="participant-header panel glass-panel participant-hero-v2 unified-display-top" id="displayChrome">
      <div class="participant-controls unified-display-controls unified-display-controls-single">
        <div class="button-row compact-row participant-audio-actions">
          <span class="status-pill active" style="pointer-events:none;cursor:default">DEMO</span>
          <button class="btn btn-primary" type="button" onclick="document.documentElement.requestFullscreen?.()">Full screen</button>
        </div>
      </div>
      <div class="eyebrow">Sanctuary Voice Main Screen</div>
      <h1>Sunday Service — Preview</h1>
      <div class="muted">This is a preview. The live view is accessible only via an event link.</div>
    </section>

    <section class="participant-live panel glass-panel unified-display-live">
      <div class="participant-main-text unified-display-text">
        For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life.
      </div>
    </section>
  </main>
</body>
</html>
