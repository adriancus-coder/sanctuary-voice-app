<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sanctuary Voice Song Screen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="display-body display-theme-dark">
  <main class="participant-shell participant-shell-v2 unified-display-shell">
    <section class="participant-header panel glass-panel participant-hero-v2 unified-display-top" id="displayChrome">
      <div class="eyebrow">Sanctuary Voice Song Screen</div>
      <h1 id="translateEventName">Connecting...</h1>
      <div id="translateStatus" class="muted">Connecting to live event...</div>
      <div class="participant-controls unified-display-controls">
        <div>
          <label for="translateLanguage">Screen language</label>
          <select id="translateLanguage"></select>
        </div>
        <div class="button-row compact-row participant-audio-actions">
          <button id="fullscreenBtn" class="btn btn-primary" type="button">Full screen</button>
        </div>
        <div>
          <div class="small">Mode: <span id="translateModeBadge">Song mode</span></div>
          <div class="small">Language: <span id="translateLanguageLabel">-</span></div>
        </div>
      </div>
    </section>

    <section id="translateTextWrap" class="participant-live panel glass-panel unified-display-live">
      <div class="label" id="translateScreenLabel">Song mode</div>
      <div id="translateText" class="participant-main-text unified-display-text">Waiting for song translation...</div>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/translate.js"></script>
</body>
</html>
