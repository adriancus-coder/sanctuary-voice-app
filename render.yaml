services:
  - type: web
    name: sanctuary-voice
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
